[package]
name = "lqm-ingest"
version.workspace = true
edition.workspace = true

[features]
default = []
pdf = ["dep:pdf-extract"]

[dependencies]
lqm-core = { path = "../lqm-core" }
thiserror = "2"
serde_json = "1"
pdf-extract = { version = "0.12", optional = true }

[dev-dependencies]
uuid = { version = "1", features = ["v4"] }
