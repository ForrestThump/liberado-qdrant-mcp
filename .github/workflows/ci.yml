name: CI

on:
  push:
    branches: [main, "session/*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check + Fmt + Clippy + Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  # Optional: exercise live Qdrant smokes when the service is available.
  # Default workspace tests already skip when Qdrant is down.
  live-qdrant:
    name: Live Qdrant smokes (optional)
    runs-on: ubuntu-24.04
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.3
        ports:
          - 6333:6333
          - 6334:6334
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:6333/ >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "Qdrant did not become ready" >&2
          exit 1

      - name: Live MCP smokes
        env:
          QDRANT_URL: http://127.0.0.1:6334
          LQM_LIVE: "1"
        run: cargo test -p lqm-mcp live_smoke -- --nocapture
